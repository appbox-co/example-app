# =============================================================================
# appbox.yml — Appbox App Configuration
# =============================================================================
#
# This file defines everything the Appbox platform needs to install, configure,
# and manage your app. It is the single source of truth for your app's:
#
#   - Store listing metadata (name, description, icon, categories)
#   - Docker image and versioning
#   - Container runtime settings (memory, CPU, capabilities, etc.)
#   - Networking and domain configuration
#   - Platform behavior (callbacks, restarts, updates)
#   - Port mappings (fixed, ranges, and dynamic)
#   - Volume bind mounts for persistent data
#   - Environment variables injected into the container
#   - Custom fields shown to the user during install
#   - Advanced container settings (devices, ulimits, sysctls, chains)
#
# STRUCTURE:
#   Only the `app` and `image` sections are required.
#   All other sections have sensible defaults and can be omitted entirely.
#
# USER NAMESPACE (userns):
#   All Appbox containers run with user namespaces enabled for security.
#   This means UID 0 (root) inside the container is mapped to an unprivileged
#   UID on the host. Your app's processes and files should use UID 1000
#   inside the container — this is the standard non-root user that all
#   Appbox apps must use. See the `volumes` section for details on file
#   ownership.
#
# TEMPLATE VARIABLES:
#   Many fields support template variables that are resolved at install time.
#   See the "Template Variables Reference" section at the bottom of this file
#   for the complete list.
#
# =============================================================================


# =============================================================================
# Section 1: app — App Store Metadata
# =============================================================================
# These fields control how your app appears in the Appbox app store.
# Maps to the `apps` table in the database.
#
app:

  # display_name (REQUIRED)
  # The name shown in the app store, on cards, and in the dashboard.
  # Must be unique across all apps on the platform.
  # Maps to: apps.display_name (varchar, unique)
  display_name: "Uptime Kuma"

  # publisher (REQUIRED)
  # The developer or organization name shown below the app title.
  # Displayed as "By <publisher>" on store cards and detail pages.
  # Maps to: apps.publisher (varchar)
  publisher: "louislam"

  # description (REQUIRED)
  # Full description shown on the app detail page. Supports Markdown.
  # This should explain what the app does, key features, and any
  # important information users should know before installing.
  #
  # Submissions should follow this template as closely as possible:
  #
  #   1. Opening paragraph — one or two sentences explaining what the app
  #      is and what it does. Keep it concise and factual.
  #   2. ## Features — bullet list of the app's key capabilities.
  #   3. ## Ideal For — bullet list of target use cases or audiences.
  #   4. ## Good to Know (optional) — caveats, licensing notes, or anything
  #      users should be aware of before installing.
  #
  # Maps to: apps.description (text)
  description: |
    Uptime Kuma is a self-hosted monitoring tool similar to Uptime Robot. It provides a modern dashboard for tracking the availability of your services with rich notification support.

    ## Features

    - Monitor uptime for HTTP(s), TCP, HTTP(s) Keyword, Ping, DNS, and more
    - Notifications via Telegram, Discord, Gotify, Slack, Pushover, Email, and 90+ services
    - Fast, reactive UI with real-time status updates
    - Multi-language support
    - Status pages with custom domain support
    - Proxy and certificate monitoring for HTTPS endpoints

    ## Ideal For

    - Monitoring personal or team infrastructure without a third-party service
    - Self-hosters who want a lightweight, all-in-one uptime dashboard
    - Users who need flexible alerting across many notification channels

  # short_description
  # A brief one-line summary shown on app store cards.
  # If omitted, the platform truncates `description` for card display.
  # Maps to: apps.short_description (text)
  short_description: "A self-hosted monitoring tool like Uptime Robot"

  # icon
  # Path to the app icon file, relative to this repository's root.
  # Should be a 512x512 PNG image. This is uploaded to the platform's
  # image server during app registration.
  # Maps to: apps.icon_image (varchar) — stored as the uploaded filename
  icon: icon.png

  # categories
  # List of category names this app belongs to. Categories are used for
  # filtering and browsing in the app store. Use existing categories where
  # possible, or suggest a new one in your submission.
  #
  # Existing categories:
  #   Blogs, CMS, Communication, Databases, Documentation, File Manager,
  #   Games, Marketing, Media, Notes, Operating System, Privacy,
  #   Programming, Projects, SEO Utilities, Stacks, Streaming, Sync,
  #   Torrent Clients, VPS, Webserver, Windows
  #
  # All apps are automatically added to "All Apps" — do not list it here.
  # Maps to: links table (type='appcategory', relid1=app_id, relid2=category_id)
  categories:
    - "Communication"

  # devsite
  # URL to the developer's website or project homepage. Shown as a
  # "Visit developer" link on the app detail page.
  # Maps to: apps.devsite (varchar)
  devsite: "https://github.com/louislam/uptime-kuma"

  # source_repo
  # URL to the source code repository. Helps with transparency and trust.
  # Maps to: apps.source_repo (varchar)
  source_repo: "https://github.com/louislam/uptime-kuma"


# =============================================================================
# Section 2: image — Docker Image
# =============================================================================
# Defines the Docker image to pull and run. The `version` and `tag` fields
# create the initial entry in the `app_versions` table.
#
# Maps to: apps table (type, registry, Image) + app_versions table
#
image:

  # name (REQUIRED)
  # The Docker image name (without tag). For Docker Hub, use the full
  # repository path (e.g. "louislam/uptime-kuma"). For the private registry,
  # use just the image name (e.g. "uptime-kuma").
  # Maps to: apps.Image (varchar)
  name: "uptime-kuma"

  # version (REQUIRED)
  # The version string for this release, shown to users in the app store
  # and dashboard. This creates an entry in the `app_versions` table.
  # Maps to: app_versions.version (varchar)
  version: "2"

  # tag
  # The Docker image tag to pull. Defaults to the value of `version` if
  # omitted. Useful when your version string differs from the Docker tag
  # (e.g. version "1.0.0" might use tag "v1.0.0" or "latest").
  # Maps to: app_versions.tag (varchar)
  tag: "2"


# =============================================================================
# Section 3: container — Container Runtime Configuration
# =============================================================================
# Controls how the Docker container is created and constrained.
# All fields are optional with sensible defaults.
#
# Maps to: various fields on the `apps` table (Docker API parameters)
#
container:

  # cmd
  # Override the container's default CMD. This is passed as the command
  # argument to the Docker API. Leave null to use the image's default CMD.
  # Format: string (e.g. "node server.js" or "/bin/sh -c 'start.sh'")
  # Maps to: apps.cmd (varchar)
  # Default: null (use image default)
  cmd: null

  # user
  # Run the container process as this user. Can be a username or UID.
  # Format: "user", "uid", "user:group", or "uid:gid"
  # Maps to: apps.User (text)
  # Default: null (use image default)
  user: null

  # group_add
  # Additional groups for the container process. Comma-separated.
  # Useful for granting access to host devices (e.g. "video,render").
  # Maps to: apps.GroupAdd (text)
  # Default: null
  group_add: null

  # memory
  # Hard memory limit in gigabytes. The container is killed (OOM) if it
  # exceeds this. Set to 0 for unlimited. Choose based on your app's
  # typical usage — too low causes crashes, too high wastes resources.
  # Maps to: apps.Memory (integer, GB)
  # Default: 0 (unlimited)
  memory: 1

  # memory_swap
  # Total memory + swap limit in gigabytes. Must be >= memory.
  # Set to 0 for unlimited swap. Set equal to `memory` to disable swap.
  # Maps to: apps.MemorySwap (integer, GB)
  # Default: 0 (unlimited)
  memory_swap: 0

  # memory_reservation
  # Soft memory limit in gigabytes. The kernel reclaims memory from the
  # container when the host is under memory pressure, down to this limit.
  # Should be lower than `memory`.
  # Maps to: apps.MemoryReservation (integer, GB)
  # Default: 0 (no reservation)
  memory_reservation: 0

  # cpus
  # CPU limit as a decimal. 1.0 = one full CPU core. 0.5 = half a core.
  # 0 = unlimited. Most apps work fine with 0.5–2.0.
  # Maps to: apps.CPUs (integer/float)
  # Default: 0 (unlimited)
  cpus: 0

  # init
  # Whether to run an init process (tini) inside the container as PID 1.
  # This properly handles signal forwarding and zombie process reaping.
  # Enable this if your app doesn't handle signals well on its own.
  # Not needed if your entrypoint uses `exec` to replace the shell process.
  # Maps to: apps.Init (integer, 0/1)
  # Default: false
  init: false

  # cap_add
  # Linux capabilities to add to the container. Comma-separated.
  # Use this for fine-grained access control when the app needs
  # specific kernel capabilities beyond the Docker defaults.
  # Common values: SYS_ADMIN, NET_ADMIN, NET_RAW, SYS_PTRACE, MKNOD
  # Full list: https://man7.org/linux/man-pages/man7/capabilities.7.html
  # Maps to: apps.CapAdd (varchar)
  # Default: null (no additional capabilities)
  cap_add: null

  # cap_drop
  # Linux capabilities to remove from the container. Comma-separated.
  # Use to harden the container by removing unneeded capabilities.
  # Example: "ALL" drops everything (then add back only what's needed).
  # Maps to: apps.CapDrop (varchar)
  # Default: null (keep Docker defaults)
  cap_drop: null

  # shm_size
  # Size of /dev/shm (shared memory) in bytes. Increase this if your app
  # needs shared memory (e.g. browsers, video processing).
  # Example: 67108864 = 64MB, 2147483648 = 2GB
  # Maps to: apps.ShmSize (integer)
  # Default: null (Docker default, usually 64MB)
  shm_size: null

  # pids_limit
  # Maximum number of PIDs (processes) allowed in the container.
  # Prevents fork bombs and runaway process creation.
  # Maps to: apps.PidsLimit (integer)
  # Default: null (unlimited)
  pids_limit: null


# =============================================================================
# Section 4: networking — Domain and SSL Configuration
# =============================================================================
# Controls how the app is exposed to the internet through the platform's
# reverse proxy and domain management.
#
# Maps to: various fields on the `apps` table
#
networking:

  # subdomain (REQUIRED for web apps)
  # The default subdomain prefix used when assigning a domain to this app.
  # For example, "uptime-kuma" creates "uptime-kuma.user-domain.com".
  # Must be URL-safe (lowercase letters, numbers, hyphens).
  # Maps to: apps.subdomain (varchar)
  subdomain: "uptime-kuma"

  # is_web_app
  # Whether this is a web application accessible via HTTP/HTTPS.
  # When true, the platform sets up a reverse proxy to route traffic
  # from the assigned domain to the container's internal port.
  # When false, the app is only accessible via its assigned port(s).
  # Maps to: apps.IsWebApp (integer, 0/1)
  # Default: false
  is_web_app: true

  # requires_domain
  # Whether the app requires a domain to be assigned during installation.
  # Most web apps need this. Non-web apps (like database servers or
  # torrent clients accessed by port) may not.
  # Maps to: apps.RequiresDomain (integer, 0/1)
  # Default: false
  requires_domain: true

  # ssl
  # Whether to provision an SSL certificate for the app's domain.
  # Should be true for all web apps to ensure HTTPS.
  # Maps to: apps.ssl (integer, 0/1)
  # Default: false
  ssl: true

  # multiple_domains
  # Whether the app can have more than one domain assigned to it.
  # Useful for apps like web servers or CMS platforms that serve
  # multiple websites. If true the receving end needs to use the proxy protocol to receive 
  # the traffic.
  # Maps to: apps.multiple_domains (integer, 0/1)
  # Default: false
  multiple_domains: false

  # tcp_passthrough
  # When true, TCP traffic is forwarded directly to the container without
  # HTTP processing by the reverse proxy. Use for non-HTTP protocols
  # (e.g. game servers, mail servers, custom TCP services).
  # Maps to: apps.tcp_passthrough (boolean)
  # Default: false
  tcp_passthrough: false


# =============================================================================
# Section 5: behavior — Platform Behavior
# =============================================================================
# Controls how the platform manages this app's lifecycle: installations,
# restarts, updates, and data migration.
#
# Maps to: various fields on the `apps` table
#
behavior:

  # app_slots (REQUIRED)
  # How many resource slots this app consumes when installed. Each user
  # has a limited number of slots. Simple apps use 1 slot. Resource-heavy
  # apps (like Plex, Nextcloud) may use 2–4 slots.
  # Maps to: apps.app_slots (integer)
  # Default: 1
  app_slots: 1

  # expect_callback
  # Whether the container will call back to the platform API when installation
  # is complete. When true, the entrypoint script MUST call the callback URL
  # (see entrypoint.sh for details) and the platform will wait for this before
  # marking the installation as complete. When false, the platform marks the
  # install as complete immediately after starting the container.
  # Set to true for apps that need first-run setup time before the user
  # accesses them (e.g. database migrations, initial config).
  # Maps to: apps.expect_callback (integer, 0/1)
  # Default: false
  expect_callback: true

  # callback_requires_auth
  # Whether the callback request from the container must include an
  # authentication token. When true, the container must send the
  # CALLBACK_TOKEN environment variable as a Bearer token.
  # Maps to: apps.callback_requires_auth (integer, 0/1)
  # Default: false
  callback_requires_auth: false

  # restart_text
  # Warning message shown to users before they restart the app.
  # Use this to warn about data loss, connected clients being dropped, etc.
  # Set to null for no warning.
  # Maps to: apps.restartText (varchar)
  # Default: null
  restart_text: null

  # can_update
  # Whether users are allowed to update this app to newer versions.
  # Set to false if updates require manual intervention or migration steps.
  # Maps to: apps.canUpdate (integer, 0/1)
  # Default: true
  can_update: true

  # update_text
  # Warning message shown to users before they update the app.
  # Use this to warn about breaking changes or backup recommendations.
  # Maps to: apps.updateText (varchar)
  # Default: null
  update_text: null

  # allow_downgrade
  # Whether users can downgrade to an older version of this app.
  # Generally false, as downgrades can cause data corruption if the
  # database schema has changed.
  # Maps to: apps.allow_downgrade (smallint, 0/1)
  # Default: false
  allow_downgrade: false

  # ssl_restart
  # Whether to automatically restart the app every 15 days to pick up
  # renewed SSL certificates. Only needed for apps that load certificates
  # at startup and don't watch for changes.
  # Maps to: apps.ssl_restart (integer, 0/1)
  # Default: false
  ssl_restart: false



# =============================================================================
# Section 6: install — Install Descriptions
# =============================================================================
# Text shown to users during the installation process. Use these to provide
# context, instructions, or important notes.
#
# Maps to: apps table
#
install:

  # pre_description
  # Shown above the custom fields form during installation. Use to explain
  # what the custom fields are for or provide pre-install instructions.
  # Supports plain text.
  # Maps to: apps.custom_field_preinstall_description (varchar)
  # Default: null
  pre_description: "Choose a username and password for your Uptime Kuma admin account."

  # post_description
  # Shown after installation completes. Use to provide getting-started
  # instructions, default credentials, or links to documentation.
  # Supports plain text.
  # Maps to: apps.custom_field_postinstall_description (varchar)
  # Default: null
  post_description: "Your monitoring dashboard is ready! Log in with the credentials you chose during installation."

  # custom_description
  # A custom description for the install page, replacing the default one.
  # Use only when the standard app description is not suitable for the
  # install context.
  # Maps to: apps.custom_description (text)
  # Default: null
  custom_description: null


# =============================================================================
# Section 7: ports — Port Configuration
# =============================================================================
# Defines which ports the container needs to be publicly exposed. The platform
# allocates external (host) ports and maps them to the container's internal
# ports.
#
# IMPORTANT — WEB APPS:
#   If your app is a web app (is_web_app: true) and ONLY exposes a web UI,
#   you do NOT need any ports defined here. The platform reverse-proxies
#   HTTP traffic to your container automatically via nginx.
#
#   Instead, set the VIRTUAL_PORT environment variable (in the env section)
#   to the HTTP port your app listens on inside the container. If your app
#   listens on port 80, VIRTUAL_PORT is not needed (it's the default).
#   VIRTUAL_PORT must ALWAYS be an HTTP (not HTTPS) port — the platform
#   handles SSL termination.
#
#   Only define ports here if your app needs publicly reachable non-HTTP
#   ports (e.g. a game server, SFTP, or API on a custom protocol).
#   Defining your HTTP port here would expose it publicly, bypassing the
#   reverse proxy and SSL — which is almost never what you want.
#
# There are two types of port allocation:
#
#   RANGE (fixed internal ports):
#     You specify the internal port(s) your app listens on. The platform
#     assigns random available external ports on the host and maps them.
#     Use when your app has known, fixed ports.
#
#     Format: A string of port numbers and/or ranges, comma-separated.
#       "3001"           — single port
#       "8080-8090"      — port range (11 ports)
#       "80,443,8080"    — multiple ports
#       "80,443,8080-8090" — mixed
#
#   DYNAMIC (random internal AND external ports):
#     You specify how many ports you need. The platform allocates that many
#     consecutive ports and maps them 1:1 (internal = external).
#     Use when your app can be configured to use any port, or when you need
#     a pool of ports.
#
# Ports are split by protocol:
#   tcp      — TCP only
#   udp      — UDP only
#   combined — Both TCP and UDP on the same port number
#
# Maps to: apps table (TCPPortRange, UDPPortRange, CombinedPortRange,
#          TCPDynamicPorts, UDPDynamicPorts, CombinedDynamicPorts)
#
# At runtime, allocated ports are available via template variables:
#   %PORTS|0.INTERNAL%  — first port's internal number
#   %PORTS|0.EXTERNAL%  — first port's external (host) number
#   %PORTS|1.INTERNAL%  — second port, etc.
#
ports:

  # Uptime Kuma is a web-only app, so no ports need to be publicly exposed.
  # The platform reverse-proxies HTTP traffic to VIRTUAL_PORT (3001) via nginx.

  tcp:
    # range — Fixed internal TCP port(s), mapped to random external port(s).
    # Maps to: apps.TCPPortRange (varchar)
    range: null

    # dynamic — Number of random TCP ports to allocate (internal = external).
    # Set to 0 if not needed. Example: a media server needing 5 random ports
    # would set this to 5.
    # Maps to: apps.TCPDynamicPorts (integer)
    dynamic: 0

  udp:
    # range — Fixed internal UDP port(s). Same format as tcp.range.
    # Example: a game server on UDP 27015 would use range: "27015"
    # Maps to: apps.UDPPortRange (varchar)
    range: null

    # dynamic — Number of random UDP ports to allocate.
    # Maps to: apps.UDPDynamicPorts (integer)
    dynamic: 0

  combined:
    # range — Fixed internal port(s) for BOTH TCP and UDP.
    # The same external port is mapped for both protocols.
    # Example: a VoIP server needing port 5060 for both TCP and UDP.
    # Maps to: apps.CombinedPortRange (text)
    range: null

    # dynamic — Number of random ports for both TCP and UDP.
    # Maps to: apps.CombinedDynamicPorts (integer)
    dynamic: 0

# PORT EXAMPLES (not used by Uptime Kuma, shown for reference):
#
# Example 1: Game server with RCON (TCP) + game traffic (UDP)
#   ports:
#     tcp:
#       range: "25575"
#       dynamic: 0
#     udp:
#       range: "27015"
#       dynamic: 0
#
# Example 2: TCP port range (streaming server needing ports 8000–8010)
#   ports:
#     tcp:
#       range: "8000-8010"
#       dynamic: 0
#
# Example 3: Dynamic TCP ports (app needing 3 random ports)
#   ports:
#     tcp:
#       range: null
#       dynamic: 3
#
# Example 4: Combined fixed port (same port for TCP + UDP, e.g. SIP)
#   ports:
#     combined:
#       range: "5060"
#       dynamic: 0
#
# Example 5: Web app that ALSO exposes a non-HTTP API port
#   # VIRTUAL_PORT handles HTTP via nginx. The API port is exposed publicly.
#   ports:
#     tcp:
#       range: "9090"
#       dynamic: 0


# =============================================================================
# Section 8: volumes — Persistent Bind Mounts
# =============================================================================
# Defines directories that should be persisted across container restarts
# and upgrades. Each volume maps a source path on the host to a destination
# path inside the container.
#
# IMPORTANT: Data in any path NOT listed here is lost when the container
# is replaced (during updates or restarts). The entrypoint script should
# check for files in these paths to detect whether this is a fresh install
# or an upgrade.
#
# FILE OWNERSHIP:
#   All Appbox apps run as UID 1000 inside the container. Any files or
#   directories that the app needs to read or write MUST be owned by
#   UID 1000:GID 1000 inside the container. Your Dockerfile or entrypoint
#   should ensure this with: chown -R 1000:1000 /path/to/data
#
#   The `uid` field below should always be set to 1000 (matching the
#   container UID). The platform handles host-side UID remapping via
#   user namespaces automatically.
#
# The host source path is relative to the user's app directory:
#   /apps/<app-domain>/<source>
#
# Maps to: appbinds table (app_id, Source, Destination, Permissions, UID, version)
#
volumes:

  - # source
    # The directory name on the host, relative to /apps/<app-domain>/.
    # This is the name of the folder created on the host filesystem.
    # Maps to: appbinds.Source (varchar)
    source: "data"

    # destination
    # The mount point inside the container. This is where the host
    # directory appears inside the running container.
    # Maps to: appbinds.Destination (varchar)
    destination: "/app/data"

    # permissions
    # Mount permissions. Controls whether the container can write.
    # Possible values:
    #   rw — Read-write (most apps need this)
    #   ro — Read-only (for config files that shouldn't be modified)
    # Maps to: appbinds.Permissions (varchar)
    permissions: "rw"

    # uid
    # The user ID that owns the mounted directory INSIDE THE CONTAINER.
    # This must match the UID your app runs as.
    #
    # All Appbox apps run as UID 1000 inside the container, so this
    # should always be 1000. The platform handles the host-side UID
    # mapping via user namespaces automatically.
    #
    # Maps to: appbinds.UID (integer)
    uid: 1000


# =============================================================================
# Section 9: env — Environment Variables
# =============================================================================
# Environment variables injected into the container at runtime.
# These are set BEFORE the entrypoint script runs and are available
# throughout the container's lifecycle.
#
# In addition to the variables you define here, the platform always
# injects these:
#   INSTANCE_ID     — The unique ID for this app instance
#   VIRTUAL_HOST    — The assigned domain for the app
#   CALLBACK_TOKEN  — Auth token for the callback endpoint (if needed)
#
# Plus any custom field values are also injected as env vars, using the
# field's `fname` (key name) as the variable name.
#
# VIRTUAL_PORT (web apps):
#   If your app is a web app (is_web_app: true) and it listens on a port
#   other than 80, you MUST define a VIRTUAL_PORT env var set to the HTTP
#   port your app listens on. The platform's nginx reverse proxy reads this
#   to know where to forward traffic. This must be the plain HTTP port —
#   never HTTPS, as the platform handles SSL termination.
#   If your app listens on port 80, VIRTUAL_PORT is not needed (default).
#
# Maps to: appenvironmentvars table (app_id, Key, Value, template_type, version)
#
env:

  # VIRTUAL_PORT — Required for web apps not listening on port 80.
  # Tells the platform's reverse proxy which port to forward HTTP traffic to.
  - key: VIRTUAL_PORT
    value: "3001"
    template_type: none

  - # key — The environment variable name
    # Maps to: appenvironmentvars.Key (varchar)
    key: UPTIME_KUMA_HOST

    # value — The value to set. Supports template variables.
    # Maps to: appenvironmentvars.Value (text)
    value: "0.0.0.0"

    # template_type — How the value should be resolved by the template engine.
    # Possible values:
    #   none            — Use the value as-is (no template processing)
    #   password        — Generate a random password if value is %RAND.N%
    #   complexPassword — Same as password, but enforces complexity
    #   hidden          — Generate a random value if value is %RAND.N%, not shown to user
    #   instance        — Resolve %INSTANCE.*%, %CYLO.*%, %SERVER.*%, etc.
    # Maps to: appenvironmentvars.template_type (varchar)
    template_type: none

  - key: UPTIME_KUMA_PORT
    value: "3001"
    template_type: none

# ENV EXAMPLES (not used by Uptime Kuma, shown for reference):
#
# Example: Auto-generated random database password
#   - key: DB_PASSWORD
#     value: "%RAND.32%"
#     template_type: password
#
# Example: Using instance template variables
#   - key: APP_URL
#     value: "https://%DOMAIN.DOMAIN%"
#     template_type: instance
#
# Example: Using the password from a custom field
#   - key: ADMIN_PASS
#     value: "%PASSWORD%"
#     template_type: instance


# =============================================================================
# Section 10: custom_fields — User Input During Installation
# =============================================================================
# Custom fields are shown as a form to the user during app installation.
# Each field's value is:
#   1. Validated on the client and server
#   2. Stored in the customfieldvalue table
#   3. Injected as an environment variable (key = field name, e.g. USERNAME)
#
# The key for each field (e.g. "USERNAME") becomes both the `fname` in the
# database and the environment variable name in the container.
#
# Maps to: customfields table (type='app', relid=app_id, fname, display_name,
#          fieldtype, default_value, required, options, regex, template_type,
#          minLength, maxLength, flex, sort_order, version)
#
custom_fields:

  USERNAME:
    # label — Display name shown next to the input field
    # Maps to: customfields.display_name (varchar)
    label: "Admin Username"

    # type — The input field type. Determines how the field is rendered
    # and what kind of data it accepts.
    #
    # Possible values:
    #   dynamicText      — Standard text input
    #   alphaNumeric     — Text input, alphanumeric characters only
    #   password         — Password field (masked input, auto-generated if default is %RAND.N%)
    #   complexPassword  — Password with complexity requirements (uppercase, lowercase, number, special)
    #   number           — Numeric input
    #   email            — Email address input with validation
    #   date             — Date input
    #   switch           — Toggle switch (on/off, value is "1" or "0")
    #   selector         — Dropdown select menu (options from params.menuItems)
    #   staticText       — Read-only text display (shows default_value)
    #   externalURL      — Read-only URL field. Value can be set by the container via the
    #                       API callback (see "Callback with custom fields" below). Displayed
    #                       as a clickable link on the installed app page. Use for URLs
    #                       that are only known after the app starts.
    #   hidden           — Hidden field, not shown to the user (useful for auto-generated values)
    #   spacer           — Visual spacing element, not an actual input
    #
    # Maps to: customfields.fieldtype (varchar)
    type: dynamicText

    # width — Grid width of the field (1–12, based on a 12-column grid).
    # 6 = half width, 12 = full width. Use to arrange fields side by side.
    # Maps to: customfields.flex (integer)
    width: 6

    # default_value — Pre-filled value for the field.
    # For password/hidden types, use "%RAND.N%" to auto-generate a random
    # hex string of N characters.
    # Maps to: customfields.default_value (text)
    default_value: "admin"

    # template_type — How this field's value is processed by the template engine.
    # Same options as env template_type.
    # Maps to: customfields.template_type (varchar)
    # Default: none
    template_type: none

    # validate — List of validation rules applied to the field value.
    #
    # String rules:
    #   required         — Field must not be empty
    #   alphanumeric     — Only letters and numbers
    #   notOnlyAlpha     — Must contain at least one non-letter character
    #   complexPassword  — Must meet complexity requirements (upper, lower, number, special)
    #   email            — Must be a valid email address
    #   date             — Must be a valid date
    #
    # Object rules:
    #   { minLength: N }         — Minimum character length
    #   { maxLength: N }         — Maximum character length
    #   { matches: "regex" }     — Must match the regular expression
    #                               (set params.regex and params.errorText too)
    #
    # Maps to: customfields.required (integer), customfields.minLength (integer),
    #          customfields.maxLength (integer), customfields.regex (text)
    validate:
      - required
      - alphanumeric
      - { minLength: 3 }

    # params — Type-specific parameters. An object with keys that depend
    # on the field type:
    #
    # For "selector" type:
    #   menuItems: { "value1": "Label 1", "value2": "Label 2" }
    #
    # For "matches" validation:
    #   regex: "^[a-z]+$"        — Regular expression pattern
    #   errorText: "Message"     — Error message on validation failure
    #
    # Maps to: customfields.options (text, JSON)
    # Default: {} (empty object)
    params: {}

  PASSWORD:
    label: "Admin Password"
    type: complexPassword
    width: 6
    default_value: null
    template_type: password
    validate:
      - required
      - complexPassword
    params: {}

  # externalURL field with a template variable — the platform resolves
  # %DOMAIN.DOMAIN% at install time, so no callback payload is needed.
  # This is the simplest way to give users a clickable link to the app.
  LOGIN_URL:
    label: "Login URL"
    type: externalURL
    width: 12
    default_value: "https://%DOMAIN.DOMAIN%/"
    template_type: instance
    validate: []
    params: {}

# CUSTOM FIELD EXAMPLES (not used by Uptime Kuma, shown for reference):
#
# Example: Auto-generated hidden password (user never sees it)
#   DB_PASSWORD:
#     label: "Database Password"
#     type: hidden
#     width: 6
#     default_value: "%RAND.32%"
#     template_type: password
#     validate: []
#     params: {}
#
# Example: Dropdown selector
#   THEME:
#     label: "Color Theme"
#     type: selector
#     width: 6
#     default_value: "dark"
#     template_type: none
#     validate:
#       - required
#     params:
#       menuItems:
#         dark: "Dark Mode"
#         light: "Light Mode"
#         auto: "System Default"
#
# Example: Toggle switch
#   ENABLE_REGISTRATION:
#     label: "Allow Public Registration"
#     type: switch
#     width: 6
#     default_value: "0"
#     template_type: none
#     validate: []
#     params:
#       menuItems:
#         "1": "Enabled"
#         "0": "Disabled"
#
# Example: Email input
#   ADMIN_EMAIL:
#     label: "Admin Email Address"
#     type: email
#     width: 6
#     default_value: ""
#     template_type: none
#     validate:
#       - required
#       - email
#     params: {}
#
# Example: Number input with validation
#   MAX_UPLOAD_SIZE:
#     label: "Max Upload Size (MB)"
#     type: number
#     width: 4
#     default_value: "100"
#     template_type: none
#     validate:
#       - required
#     params: {}
#
# Example: Text with regex validation
#   SITE_SLUG:
#     label: "Site URL Slug"
#     type: dynamicText
#     width: 6
#     default_value: ""
#     template_type: none
#     validate:
#       - required
#       - { matches: "^[a-z0-9-]+$" }
#     params:
#       regex: "^[a-z0-9-]+$"
#       errorText: "Only lowercase letters, numbers, and hyphens allowed"
#
# Example: externalURL with template variable (preferred when the URL is predictable)
#   LOGIN_URL:
#     label: "Login URL"
#     type: externalURL
#     width: 12
#     default_value: "https://%DOMAIN.DOMAIN%/"
#     template_type: instance
#     validate: []
#     params: {}
#
#   The platform resolves %DOMAIN.DOMAIN% at install time. No callback
#   payload needed. Use this approach for standard web app URLs.
#
# Example: externalURL set dynamically via callback (for URLs only known at runtime)
#   ADMIN_PANEL:
#     label: "Admin Panel"
#     type: externalURL
#     width: 12
#     default_value: ""
#     template_type: none
#     validate: []
#     params: {}
#
#   The entrypoint sets this value during the API callback:
#
#     ADMIN_URL="https://${DOMAIN}:${ADMIN_PORT}/admin"
#     curl -X POST "https://api.cylo.net/v1/apps/installed/${INSTANCE_ID}" \
#       -H "Content-Type: application/json" \
#       -d "{\"custom_fields\": [{\"key\": \"ADMIN_PANEL\", \"value\": \"${ADMIN_URL}\"}]}"
#
#   Only externalURL fields can be set via callback. If you need to update
#   other field types via callback, contact support:
#   https://billing.appbox.co/submitticket.php?step=2&deptid=1


# =============================================================================
# Section 11: advanced — Advanced Container Settings
# =============================================================================
# These settings map to additional Docker container configuration tables.
# Most apps do not need these. They are included here for completeness.
#
advanced:

  # devices — Host devices to expose inside the container.
  # Use for GPU passthrough, USB devices, etc.
  # Maps to: appdevices table (type='app', relid=app_id, PathOnHost,
  #          PathInContainer, CgroupPermissions, version)
  #
  # Example:
  #   devices:
  #     - host_path: "/dev/dri"
  #       container_path: "/dev/dri"
  #       cgroup_permissions: "rwm"
  devices: []

  # ulimits — Process resource limits inside the container.
  # Maps to: appulimits table (type='app', relid=app_id, Name, Soft, Hard, version)
  #
  # Common ulimit names:
  #   nofile    — Max open files (increase for high-connection apps)
  #   nproc     — Max processes
  #   memlock   — Max locked memory (useful for Elasticsearch)
  #   stack     — Stack size
  #
  # Example:
  #   ulimits:
  #     - name: nofile
  #       soft: 65536
  #       hard: 65536
  ulimits: []

  # sysctls — Kernel parameter overrides for the container's namespace.
  # Maps to: appsysctl table (app_id, name, value, version)
  #
  # Example:
  #   sysctls:
  #     - name: net.core.somaxconn
  #       value: "1024"
  #     - name: net.ipv4.tcp_syncookies
  #       value: "1"
  sysctls: []

  # chains — App dependencies (NOT CURRENTLY IN USE).
  # This feature is not active and will likely be replaced in a future
  # platform update. Do not rely on it. All apps must be fully
  # self-contained in a single container.
  #
  # Maps to: appchains table (app_id, chained_to, version)
  chains: []


# =============================================================================
# Template Variables Reference
# =============================================================================
# Template variables can be used in env values, custom field default values,
# and volume source paths. They are resolved at install time or runtime by
# the platform's TemplateService.
#
# Syntax: %TABLE.FIELD%
#   Single value:  %INSTANCE.ID%
#   Array index:   %PORTS|0.EXTERNAL%  (0-indexed)
#   Math:          %MATH.100.+.50%     (result: 150)
#   Random:        %RAND.32%           (32-char hex string)
#   Password ref:  %PASSWORD%          (value of the password custom field)
#
# Available tables and their fields:
#
# %INSTANCE.*%
#   ID, APP_ID, VERSION, CALLBACK_TOKEN
#
# %CYLO.*%
#   ID, CYLONAME, SERVER_IP
#
# %SERVER.*%
#   ID, DISPLAY_NAME, IP
#
# %DOMAIN.*%
#   ID, DOMAIN, INSTANCE_ID
#
# %USER.*%
#   ID, FIRSTNAME, LASTNAME, EMAIL
#
# %APP.*%
#   ID, DISPLAY_NAME, PUBLISHER, DESCRIPTION, SHORT_DESCRIPTION
#
# %PORTS|N.*%  (N is 0-indexed)
#   INTERNAL, EXTERNAL, TYPE, QTY
#
# Special variables:
#   %RAND.N%           — Random hex string of length N (password/hidden fields only)
#   %PASSWORD%         — Value of the first password/complexPassword custom field
#   %MATH.V1.OP.V2%   — Math expression: V1 OP V2 where OP is +, -, *, or /
#                        Example: %MATH.%PORTS|0.EXTERNAL%.+.1000%
